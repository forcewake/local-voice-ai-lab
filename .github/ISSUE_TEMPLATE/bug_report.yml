name: Bug report
description: Report a reproducible CLI, benchmark, or documentation bug.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What failed, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      render: bash
      placeholder: |
        make setup
        .venv/bin/python scripts/voice_lab.py doctor
        make smoke
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: macOS version, chip, memory, Python version, and relevant package versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste sanitized logs. Do not include private audio, tokens, or sensitive transcripts.
      render: text
