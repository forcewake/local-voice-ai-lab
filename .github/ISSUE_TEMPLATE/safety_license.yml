name: Safety or license concern
description: Report a safety, consent, licensing, or publication concern.
title: "[safety/license] "
labels: ["safety", "license"]
body:
  - type: textarea
    id: concern
    attributes:
      label: Concern
      description: Describe the safety, consent, licensing, or publication issue.
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected files, models, or commands
      description: Link files, model cards, report rows, or commands involved.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Link upstream licenses, policies, model cards, or other primary sources.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I did not attach private audio, private transcripts, API keys, or model cache files.
          required: true
